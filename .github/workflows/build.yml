name: Build Android APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create placeholder PNG icons
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:#7EC8C8 assets/icon.png
          convert -size 1024x1024 xc:#7EC8C8 assets/adaptive-icon.png
          convert -size 1284x2778 xc:#C8E6F5 assets/splash.png

      - name: Install dependencies
        run: npm install

      - name: Fix package versions
        run: npx expo install expo-asset @react-native-async-storage/async-storage react-native

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build Android
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
